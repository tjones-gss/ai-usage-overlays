name: Release Installer

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: Installer version
        required: false
        default: 0.1.0
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build setup EXE
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if (-not $version) {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          }
          pwsh -NoLogo -NoProfile -File packaging\build-installer.ps1 -Version $version

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIUsageOverlaySetup
          path: dist/AIUsageOverlaySetup.exe

      - name: Attach installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AIUsageOverlaySetup.exe
